name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check bin/reviewbot.js
          node --check src/cli/index.js
          node --check src/cli/commands/review.js
          node --check src/cli/commands/config.js
          node --check src/core/diff.js
          node --check src/core/prompt.js
          node --check src/core/reviewer.js
          node --check src/core/config.js
          node --check src/github/pr.js

      - name: Run tests
        run: npm test
